<div class="main" *ngIf="isOpen">
    <div class="container-modal">
        <div class="modal-header">
            <h3>Deleta Produto</h3>
            <span (click)="close()">X</span>
        </div>

        <div class="modal-body">
            <table class="table-productList">
                <thead class="table-header">
                    <tr id="tr-header">
                        <th>Código</th>
                        <th>Nome</th>
                        <th>Categoria</th>
                    </tr>
                </thead>

                <tbody class="table-tbody disabledDiv">
                    <tr>
                        <td> {{ product.code }} </td>
                        <td> {{ product.name }} </td>
                        <td> {{ product.category?.name }} </td>
                    </tr>
                </tbody>
            </table>

            <div class="modal-footer">
                <button id="btn-cancel" (click)="close()" class="btn">Cancelar</button>
                <button id="btn-del" class="btn" (click)="deleteProduct()">Deleta</button>
            </div>
        </div>
    </div>
</div>
