<main class="main">
    <section class="section-1-header">
        <h3>Usuários Internos</h3>
        <div class="btn-header">
            <div class="search-group">
                <div class="input-false-div">
                    <input type="text" placeholder="Pesquisar usuário" [(ngModel)]="searchTerm">
                </div>

                <button class="btn-search btn" (click)="filterResponsible()">Buscar</button>
            </div>
            
            <div class="btn-header-productList">
                <!-- <button class="btn-filter btn"><mat-icon>filter_list</mat-icon> Filtros</button> -->
                <button class="btn-add btn" routerLink="/userAdd" (click)="showModal()"><mat-icon>person_add</mat-icon>Adicionar</button>
            </div>
        </div>
    </section>
    
    <section class="section-2-table">
        <table class="table-productList">
            <thead class="table-header">
                <tr id="tr-header">
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Telefone</th>
                    <th>Ativo</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody class="table-tbody">
                <tr *ngFor="let responsible of dataSource.connect() | async">
                    <td> {{ responsible.id }} </td>
                    <td matTooltipClass="tooltip-productList" matTooltipPosition="above" matTooltip="{{ responsible.name }}"> {{ responsible.name }} </td>
                    <td matTooltipClass="tooltip-productList" matTooltipPosition="above" matTooltip="{{ responsible.email }}">{{ responsible.email }}</td>
                    <td> {{ responsible.telefone }} </td>
                    <td> {{ responsible.active }} </td>
                     <td class="btn-action btn">
                        <button (click)="toggleDropdownImg()">
                            <mat-icon class="more-vert">more_vert</mat-icon>
                        </button>
                        <app-dropdown [items]="perfilItems" class="dropdown-users"  [isOpen]="dropdownOpenImg"></app-dropdown>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>
    <section class="container-oculto" *ngIf="!hasResponsible">
        <div class="box-oculto">
            <h3>Lista de Usuários está vazia no momento</h3>
            <p>Cadastre usuários para começar a gerenciar seu estoque</p>
        </div>
    </section>

    <section class="container-pesquisa container-oculto" *ngIf="dataSource.data.length === 0 && isFiltered">
        <div class="box-oculto">
            <h3>Não encontrado na Lista</h3>
        </div>
    </section>
    <mat-paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 25, 100]"></mat-paginator>
</main>
<app-user-add (userAdded)="showListResponsible()" [isOpen]="open" (closeModal)="closeModal()"></app-user-add>
<app-user-edit [isOpen]="openEdit" (closeModal)="closeModalEdit()"></app-user-edit>
