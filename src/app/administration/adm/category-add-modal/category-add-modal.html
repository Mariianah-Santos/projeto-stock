<div class="main" *ngIf="isOpen">
    <div class="container-modal">
        <div class="modal-header">
            <h3>Adicionar Categoria</h3>
            <span (click)="close()">X</span>
        </div>

        <div class="modal-body">
            <label for="name">Nome</label>
            <div class="input-false-div">
                <input type="text" id="name" placeholder="Nome" [(ngModel)]="category.name" required>
            </div>

            <div class="modal-footer">
                <button id="btn-cancel" class="btn" (click)="close()">Cancelar</button>
                <button id="btn-add" class="btn" (click)="addCategory()" [disabled]="!category.name" >Adicionar</button>
            </div>
        </div>
    </div>
</div>
