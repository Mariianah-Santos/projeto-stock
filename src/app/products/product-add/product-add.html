<div class="container main">
    <div class="box-product-add">
        <h3>Adicionar um Produto Novo</h3>
        <div class="main-product-add">
            <div class="box-input-info">
                <label for="name">Nome do Produto</label>
                <div class="input-false-div">
                    <input type="text" [(ngModel)]="product.name" name="" id="name" placeholder="Digite o nome do Produto">
                </div>
                
            </div>

            <div class="box-input-info">
                <label for="category">Categoria</label>
                <div class="input-false-div">
                    <select [(ngModel)]="product.category" class="select">
                        <option [ngValue]="null" disabled>Selecione</option>

                        <option *ngFor="let category of categorys" [ngValue]="{ id: category.id }">
                            {{ category.id }} {{ category.name }}
                        </option>
                     </select>
                </div>
            </div>

            <div class="box-input-info">
                <div class="row-input">

                    <div class="input-group">
                        <label for="unid">Unidade</label>
                        <div class="input-false-div">
                            <input type="number" [(ngModel)]="product.quantity" id="unid" placeholder="Quantidades do produto">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="price">Preço <span id="priceSpan">R$</span></label>
                        <div class="input-false-div">
                            <input type="number" [(ngModel)]="product.price" id="price" placeholder="Digite o preço do Produto">
                        </div>
                    </div>

                </div>
            </div>

                       <div class="box-input-info">
                <div class="row-input">

                    <div class="input-group">
                        <label for="unid">Data de Criação</label>
                        <div class="input-false-div disabledDiv">
                            <span>{{ product.dateCreate | date: 'dd/MM/yyyy' }}</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="price">Responsável</label>
                        <div class="input-false-div disabledDiv">
                            <span> {{  user?.name  }} </span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="btn btn-footer-action">
            <button id="product-add" routerLink="/" (click)="addProduct()" [disabled]="!product.name || !product.price || !product.quantity || !product.category">Adicionar</button>
            <button id="product-cancel" routerLink="/">Cancelar</button>
        </div>
    </div>
</div>
